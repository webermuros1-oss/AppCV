name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm debe instalarse ANTES de setup-node para que el cache 'pnpm' funcione.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r --parallel typecheck

      - name: Tests
        run: pnpm test
